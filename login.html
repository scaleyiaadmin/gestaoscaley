<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Gestão Scaley</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg-main);
      margin: 0;
    }
    .auth-container {
      background: var(--bg-card);
      padding: 2.5rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      text-align: center;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .auth-logo i {
      color: var(--accent-primary);
      width: 32px;
      height: 32px;
    }
    .auth-logo h1 {
      font-size: 24px;
      color: var(--text-primary);
    }
    .auth-form {
      text-align: left;
    }
    .auth-error {
      color: var(--color-danger);
      background: rgba(248, 113, 113, 0.1);
      border-left: 3px solid var(--color-danger);
      padding: 10px;
      font-size: 13px;
      margin-bottom: 1rem;
      border-radius: var(--radius-sm);
      display: none;
    }
    .auth-success {
      color: var(--color-success);
      background: rgba(74, 222, 128, 0.1);
      border-left: 3px solid var(--color-success);
      padding: 10px;
      font-size: 13px;
      margin-bottom: 1rem;
      border-radius: var(--radius-sm);
      display: none;
    }
    .auth-toggle {
      margin-top: 1.5rem;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .auth-toggle a {
      color: var(--accent-primary);
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
    }
    .auth-toggle a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-logo">
      <i data-lucide="layers"></i>
      <h1>Gestão Scaley</h1>
    </div>

    <!-- MENSAGENS -->
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>

    <form class="auth-form" id="auth-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="auth-email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="auth-pass" placeholder="••••••••" required>
      </div>
      
      <!-- Checkbox de "Manter Logado" etc poderia vir aqui -->

      <button type="submit" class="btn btn-primary" id="auth-btn" style="width: 100%; justify-content: center; margin-top: 1rem; height: 44px; font-size: 15px;">
        Entrar no Sistema
      </button>
    </form>

    <div class="auth-toggle" id="auth-toggle-box">
      Não tem uma conta? <a id="toggle-auth-mode">Criar agora</a>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    lucide.createIcons();
  </script>
  <script src="js/auth.js"></script>

</body>
</html>
