<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso - Gestão Scaley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top right, rgba(124, 92, 252, 0.15), transparent),
                  radial-gradient(circle at bottom left, rgba(76, 201, 240, 0.1), transparent),
                  var(--bg-primary);
    }

    .auth-layout {
      width: 100%;
      max-width: 440px;
      padding: var(--space-6);
      animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      padding: var(--space-10) var(--space-8);
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-primary);
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-10);
    }

    .logo-glow {
      width: 64px;
      height: 64px;
      background: var(--accent-primary-soft);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-6);
      color: var(--accent-primary);
      box-shadow: 0 8px 16px rgba(124, 92, 252, 0.2);
    }

    .auth-header h1 {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-2);
      background: #fff;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(to bottom, #fff, #8a8a9a);
    }

    .auth-header p {
      color: var(--text-secondary);
      font-size: var(--font-size-base);
    }

    .form-group label {
      display: block;
      margin-bottom: var(--space-2);
      font-size: var(--font-size-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-tertiary);
      transition: color var(--transition-fast);
    }

    .input-wrapper input {
      padding-left: 44px;
      height: 48px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      font-size: var(--font-size-base);
    }

    .input-wrapper input:focus {
      border-color: var(--accent-primary);
      background: var(--bg-input-focus);
    }

    .input-wrapper input:focus + i {
      color: var(--accent-primary);
    }

    .auth-footer {
      margin-top: var(--space-8);
      text-align: center;
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
    }

    .auth-footer a {
      font-weight: 600;
      color: var(--accent-primary);
    }

    .auth-error, .auth-success {
      padding: var(--space-4);
      border-radius: var(--radius-md);
      font-size: var(--font-size-sm);
      margin-bottom: var(--space-6);
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .auth-error {
      background: var(--color-danger-soft);
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: var(--color-danger);
    }

    .auth-success {
      background: var(--color-success-soft);
      border: 1px solid rgba(52, 211, 153, 0.2);
      color: var(--color-success);
    }

    #auth-btn {
      width: 100%;
      height: 48px;
      justify-content: center;
      font-size: var(--font-size-md);
      margin-top: var(--space-2);
    }

    /* Background decoration */
    .bg-blob {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: var(--accent-primary);
      filter: blur(120px);
      opacity: 0.05;
      z-index: -1;
    }
  </style>
</head>
<body>

  <div class="bg-blob" style="top: -100px; right: -100px;"></div>
  <div class="bg-blob" style="bottom: -100px; left: -100px; background: var(--accent-secondary);"></div>

  <div class="auth-layout">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-glow">
          <i data-lucide="layers" style="width: 32px; height: 32px;"></i>
        </div>
        <h1 id="auth-title">Gestão Scaley</h1>
        <p id="auth-subtitle">Entre com suas credenciais para continuar</p>
      </div>

      <div class="auth-error" id="auth-error"></div>
      <div class="auth-success" id="auth-success"></div>

      <form id="auth-form">
        <div class="form-group">
          <label for="auth-email">E-mail Corporativo</label>
          <div class="input-wrapper">
            <i data-lucide="mail"></i>
            <input type="email" id="auth-email" placeholder="exemplo@scaley.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group" style="margin-bottom: var(--space-8);">
          <label for="auth-pass">Sua Senha</label>
          <div class="input-wrapper">
            <i data-lucide="lock"></i>
            <input type="password" id="auth-pass" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="auth-btn">
          <span>Acessar Dashboard</span>
          <i data-lucide="arrow-right"></i>
        </button>
      </form>

      <div class="auth-footer">
        <span id="toggle-text">Não tem uma conta corporativa?</span>
        <a href="#" id="toggle-auth-mode">Solicitar Acesso</a>
      </div>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    lucide.createIcons();
  </script>
  <script src="js/auth.js"></script>

</body>
</html>
